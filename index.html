    function spawnPickup(x, y, type, value) {
        gs.pickups.push({ x, y, type, value, life: 300, collected: false });
    }

    function drawPickupShape(x, y, type, magnetActive) {
        ctx.save();
        const info = PICKUP_COLORS[type];
        const active = type === 'magnet' && magnetActive > 0;

        if (active) {
            ctx.shadowBlur = 12;
            ctx.shadowColor = info.glow;
        }

        ctx.fillStyle = info.color;
        ctx.strokeStyle = info.glow;
        ctx.lineWidth = 2;

        if (type === 'gold') {
            ctx.beginPath();
            ctx.arc(x, y, 9, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = '#7d5000';
            ctx.font = 'bold 10px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('$', x, y);
        } else if (type === 'ticket') {
            ctx.fillStyle = info.color;
            ctx.strokeStyle = info.glow;
            ctx.lineWidth = 1.5;
            roundRect(ctx, x - 8, y - 11, 16, 22, 3);
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 10px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('T', x, y);
        } else if (type === 'heal') {
            drawHeart(x, y + 2, 12, info.color);
        } else {
            ctx.strokeStyle = info.color;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.arc(x, y, 9, Math.PI, 0, false);
            ctx.stroke();
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(x - 9, y); ctx.lineTo(x - 9, y + 6);
            ctx.moveTo(x + 9, y); ctx.lineTo(x + 9, y + 6);
            ctx.stroke();
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(x - 11, y + 6, 4, 4);
            ctx.fillStyle = '#3498db';
            ctx.fillRect(x + 7, y + 6, 4, 4);
        }

        ctx.shadowBlur = 0;
        ctx.restore();
    }

    function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    function spawnEnemy() {
        let x, y;
        if (Math.random() < 0.5) {
            x = Math.random() < 0.5 ? -20 : CONFIG.WIDTH+20;
            y = Math.random() * CONFIG.HEIGHT;
        } else {
            x = Math.random() * CONFIG.WIDTH;
            y = Math.random() < 0.5 ? -20 : CONFIG.HEIGHT+20;
        }

        const total = ENEMY_TYPES.reduce((s,t) => s+t.weight, 0);
        let r = Math.random() * total;
        let type = ENEMY_TYPES[0];
        for (const t of ENEMY_TYPES) {
            r -= t.weight;
            if (r <= 0) { type = t; break; }
        }

        gs.enemies.push(new Enemy(x, y, {...type, maxHp: type.hp * (1 + gs.wave*0.1)}));
        gs.enemies[gs.enemies.length-1].hp = gs.enemies[gs.enemies.length-1].maxHp;
    }

    function autoAttack() {
        if (!gs.enemies.length) return;

        let nearest = null, minD = Infinity;
        gs.enemies.forEach(e => {
            const d = dist(gs.player.x, gs.player.y, e.x, e.y);
            if (d < minD) { minD = d; nearest = e; }
        });

        if (nearest) {
            const angle = Math.atan2(nearest.y - gs.player.y, nearest.x - gs.player.x);
            gs.bullets.push(new SimpleBullet(gs.player.x, gs.player.y, angle, {damage: gs.baseDamage, speed:1}));
        }
    }

    // 简单子弹（自动攻击用）
    class SimpleBullet {
        constructor(x, y, angle, eff) {
            this.x = x; this.y = y;
            this.vx = Math.cos(angle) * CONFIG.BULLET_SPEED * (eff.speed || 1);
            this.vy = Math.sin(angle) * CONFIG.BULLET_SPEED * (eff.speed || 1);
            this.damage = eff.damage * gs.baseDamage;
            this.alive = true;
            this.pierce = 1;
            this.color = '#74b9ff';
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            if (this.x<0||this.x>CONFIG.WIDTH||this.y<0||this.y>CONFIG.HEIGHT) this.alive = false;
        }
        draw() {
            ctx.shadowBlur = 6;
            ctx.shadowColor = this.color;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    function checkCollisions() {
        // 子弹 vs 敌人
        gs.bullets.forEach(b => {
            if (!b.alive) return;

            gs.enemies.forEach(e => {
                if (!e.alive) return;
                if (dist(b.x, b.y, e.x, e.y) < 22 * (e.size || 1)) {
                    let dmg = b.damage;
                    if (gs.buffs.length) {
                        const buff = gs.buffs[0];
                        if (Math.random() < (buff.crit || 0)) dmg *= (buff.mult || 2);
                    }
                    e.hp -= dmg;
                    e.hitFlash = 5;
                    if (b.pierceLeft !== undefined) {
                        b.pierceLeft--;
                        if (b.pierceLeft <= 0) b.alive = false;
                    } else {
                        b.alive = false;
                    }
                    spawnParticle(b.x, b.y, '#f1c40f');

                    if (e.hp <= 0) {
                        e.alive = false;
                        spawnParticle(e.x, e.y, e.color);
                        spawnPickup(e.x, e.y, 'gold', e.gold);
                        if (e.ticket > 0) spawnPickup(e.x+15, e.y-15, 'ticket', e.ticket);

                        if (e.elite) {
                            spawnPickup(e.x-15, e.y+15, 'gold', e.gold * 2);
                            if (Math.random() < 0.5) {
                                gs.pickups.push({ x: e.x, y: e.y - 30, type: 'heal', value: 1, life: 300, collected: false });
                            } else {
                                gs.pickups.push({ x: e.x + 30, y: e.y, type: 'magnet', value: 8, life: 300, collected: false });
                            }
                        }

                        gs.kills++;
                    }
                }
            });
        });

        // 拾取物 vs 玩家
        gs.pickups.forEach(p => {
            if (p.collected) return;
            const d = dist(gs.player.x, gs.player.y, p.x, p.y);

            const pickupRange = gs.player.magnetActive > 0 ? 2000 : CONFIG.PICKUP_RANGE;
            if (d < pickupRange) {
                p.x += (gs.player.x - p.x) * 0.15;
                p.y += (gs.player.y - p.y) * 0.15;
            }

            if (d < 25) {
                p.collected = true;
                if (p.type === 'gold') {
                    gs.gold += p.value;
                    gs.exp += p.value;
                    spawnParticle(p.x, p.y, '#f1c40f');
                    updateUI();

                    if (gs.exp >= gs.expToLevel) {
                        showUpgradePanel('level');
                    }
                } else if (p.type === 'ticket') {
                    gs.tickets += p.value;
                    spawnParticle(p.x, p.y, '#9b59b6');
                    updateUI();
                } else if (p.type === 'heal') {
                    const healAmount = Math.min(p.value, gs.player.maxHp - gs.player.hp);
                    gs.player.hp += healAmount;
                    spawnParticle(p.x, p.y, '#e84393');
                    showFloatingText(p.x, p.y, `+${healAmount} HP`, '#2ecc71');
                    updateUI();
                } else if (p.type === 'magnet') {
                    gs.player.magnetActive = p.value * 60;
                    spawnParticle(p.x, p.y, '#0984e3');
                    showFloatingText(p.x, p.y, `MAGNET ${p.value}s`, '#3498db');
                }
            }
        });

        if (!gs.expReady && gs.exp >= gs.expToLevel) {
            gs.expReady = true;
        }
    }

    // 生成障碍物
    const OBSTACLE_KEYS = ['rock', 'mic', 'speaker', 'light'];
    function generateObstacles() {
        const count = 6 + Math.floor(Math.random() * 4);
        const centerX = CONFIG.WIDTH / 2;
        const centerY = CONFIG.HEIGHT / 2;
        const safeZone = 120;

        for (let i = 0; i < count; i++) {
            let x, y, valid;
            let attempts = 0;

            do {
                x = 80 + Math.random() * (CONFIG.WIDTH - 160);
                y = 80 + Math.random() * (CONFIG.HEIGHT - 160);
                valid = true;

                if (dist(x, y, centerX, centerY) < safeZone) valid = false;

                for (const obs of gs.obstacles) {
                    if (dist(x, y, obs.x, obs.y) < 80) {
                        valid = false;
                        break;
                    }
                }

                attempts++;
            } while (!valid && attempts < 50);

            if (valid) {
                const key = OBSTACLE_KEYS[Math.floor(Math.random() * OBSTACLE_KEYS.length)];
                const radii = {rock:30, mic:25, speaker:35, light:25};
                gs.obstacles.push(new Obstacle(x, y, {key, name:key, radius: radii[key]}));
            }
        }
    }

    // ==================== 升级系统 ====================
    let pendingUpgrade = null;

    function showUpgradePanel(type) {
        pendingUpgrade = type;
        gs.paused = true;

        const panel = document.getElementById('upgrade-panel');
        const statOpts = document.getElementById('stat-options');
        const skillOpts = document.getElementById('skill-options');

        statOpts.innerHTML = '';
        STAT_UPGRADES.forEach((u, i) => {
            const btn = document.createElement('div');
            btn.className = 'upgrade-btn';
            btn.innerHTML = `<div class="icon-dot" style="background:${u.iconColor};">+</div><span class="label">${u.name}</span>`;
            btn.onclick = () => selectUpgrade('stat', i);
            statOpts.appendChild(btn);
        });

        skillOpts.innerHTML = '';
        if (gs.tickets > 0) {
            gs.player.skills.forEach((skill, i) => {
                const available = Object.keys(SKILL_UPGRADES).filter(k => {
                    if (k === 'damage' && skill.effects[0].damage >= 10) return false;
                    if (k === 'count' && (skill.effects[0].count || 0) >= 8) return false;
                    if (k === 'range' && (skill.effects[0].radius || skill.effects[0].range || 0) >= 200) return false;
                    return true;
                });

                if (available.length === 0) return;

                const randKey = available[Math.floor(Math.random() * available.length)];
                const upgrade = SKILL_UPGRADES[randKey];

                const btn = document.createElement('div');
                btn.className = 'upgrade-btn';
                btn.innerHTML = `
                    <canvas width="28" height="28" data-skill="${skill.id}"></canvas>
                    <span class="label">${skill.name}</span>
                    <span style="font-size:10px;color:#f1c40f;">${upgrade.name}</span>
                `;
                btn.onclick = () => selectUpgrade('skill', i, randKey);
                skillOpts.appendChild(btn);

                // 绘制技能图标
                setTimeout(() => drawSkillIcon(skill, btn.querySelector('canvas')), 50);
            });

            document.getElementById('skill-upgrades').style.display = 'block';
        } else {
            document.getElementById('skill-upgrades').style.display = 'none';
        }

        panel.style.display = 'block';
    }

    // 绘制技能小图标
    function drawSkillIcon(skill, canvas) {
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const w = canvas.width;
        const h = canvas.height;

        ctx.clearRect(0, 0, w, h);

        const palette = skill.palette || [skill.iconColor];

        switch(skill.effects[0].type) {
            case 'rainbow_trail':
                for (let i = 0; i < 5; i++) {
                    ctx.fillStyle = palette[i];
                    ctx.beginPath();
                    ctx.arc(w/2 + (i-2)*4, h/2, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
                break;
            case 'petal_aura':
                for (let i = 0; i < 3; i++) {
                    ctx.fillStyle = palette[i];
                    ctx.beginPath();
                    ctx.ellipse(w/2, h/2 - 5 + i*5, 4, 8, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
                break;
            case 'rice_wave':
                drawRiceWheat(w/2, h/2, 12, 0, palette[0]);
                break;
            case 'piano_keys':
                ctx.fillStyle = palette[1];
                ctx.fillRect(w/2 - 5, h/2 - 8, 4, 16);
                ctx.fillStyle = palette[0];
                ctx.fillRect(w/2 + 1, h/2 - 8, 4, 16);
                break;
            case 'magic_homing':
                ctx.strokeStyle = palette[1];
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(w/2, h/2, 8, 0, Math.PI * 2);
                ctx.stroke();
                ctx.fillStyle = palette[0];
                ctx.beginPath();
                ctx.arc(w/2, h/2, 4, 0, Math.PI * 2);
                ctx.fill();
                break;
            case 'water_swirl':
                drawWaterInk(w/2, h/2, 10, 0);
                break;
            case 'robot_drone':
                drawRobot(w/2, h/2, 10, palette[0]);
                break;
            case 'sickle_blade':
                drawSickleBlade(w/2, h/2, -0.5, 12, palette[0]);
                break;
            case 'heart_aura':
                drawHeart(w/2, h/2 + 2, 10, palette[0]);
                break;
            case 'ice_shards':
                drawIceShard(w/2, h/2, 10, 0, palette[0]);
                break;
            case 'star_teleport':
                drawStarSparkle(w/2, h/2, 8, palette[0], 1);
                break;
            case 'china_shield':
                drawChinaPattern(w/2, h/2, 12);
                break;
            default:
                ctx.fillStyle = palette[0];
                ctx.beginPath();
                ctx.arc(w/2, h/2, 6, 0, Math.PI * 2);
                ctx.fill();
        }
    }

    function selectUpgrade(type, idx, upgradeKey) {
        if (type === 'stat') {
            STAT_UPGRADES[idx].apply();
        } else if (type === 'skill') {
            gs.tickets--;
            const skill = gs.player.skills[idx];
            SKILL_UPGRADES[upgradeKey].apply(skill);
            skill.level++;
            spawnSkillParticle(gs.player.x, gs.player.y, skill.palette[0]);
        }

        if (pendingUpgrade === 'level') {
            gs.exp = gs.exp - gs.expToLevel;
            gs.expToLevel = Math.floor(gs.expToLevel * 1.4);
            gs.expReady = false;
        }

        document.getElementById('upgrade-panel').style.display = 'none';
        gs.paused = false;
        updateUI();
        updateSkillBar();
    }

    // ==================== UI 更新 ====================
    function updateUI() {
        document.getElementById('gold-display').textContent = gs.gold;
        document.getElementById('ticket-display').textContent = gs.tickets;
        document.getElementById('wave-display').textContent = gs.wave;
        document.getElementById('ticket-count').textContent = gs.tickets;

        const expFill = document.getElementById('exp-fill');
        const expText = document.getElementById('exp-text');
        const pct = Math.min(100, (gs.exp / gs.expToLevel) * 100);
        expFill.style.width = pct + '%';
        expText.textContent = `STAR ${gs.exp} / ${gs.expToLevel}`;

        const magnetIndicator = document.getElementById('magnet-indicator');
        if (gs.player && gs.player.magnetActive > 0) {
            magnetIndicator.style.display = 'block';
            magnetIndicator.textContent = `MAGNET ${Math.ceil(gs.player.magnetActive / 60)}s`;
        } else {
            magnetIndicator.style.display = 'none';
        }
    }

    function updateSkillBar() {
        const bar = document.getElementById('skill-bar');
        bar.innerHTML = '';

        gs.player.skills.forEach((skill, i) => {
            const div = document.createElement('div');
            const cdPct = Math.max(0, skill.cooldownTimer / skill.cooldown) * 100;
            div.className = 'skill-slot' + (skill.level > 0 ? '' : ' locked');
            div.innerHTML = `
                <canvas width="35" height="35" data-skill-bar="${skill.id}"></canvas>
                ${skill.level > 0 ? `<span class="level">Lv${skill.level}</span>` : ''}
                <div class="cooldown" style="height:${cdPct}%; background:${cdPct > 0 ? 'rgba(0,0,0,0.7)' : 'transparent'};"></div>
            `;
            div.title = `${skill.name} - ${skill.desc}`;
            div.onclick = () => gs.player.useSkill(i);
            bar.appendChild(div);

            // 绘制技能图标
            setTimeout(() => {
                const canvas = div.querySelector('canvas');
                if (canvas) {
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0, 0, 35, 35);
                    drawSkillIcon(skill, canvas);
                }
            }, 50);
        });
    }

    // ==================== 游戏主循环 ====================
    let keys = {};
    let lastTime = 0;

    function gameLoop(ts) {
        const dt = ts - lastTime;
        lastTime = ts;

        if (gs.running && !gs.paused) {
            gs.player.update(keys);

            gs.player.skills.forEach(s => {
                if (s.cooldownTimer > 0) s.cooldownTimer -= dt/1000;
            });

            gs.buffs = gs.buffs.filter(b => {
                b.timer--;
                return b.timer > 0;
            });

            gs.autoTimer += dt;
            if (gs.autoTimer >= 500) { autoAttack(); gs.autoTimer = 0; }

            gs.spawnTimer += dt;
            if (gs.spawnTimer >= gs.spawnRate) {
                spawnEnemy();
                gs.spawnTimer = 0;

                gs.kills++;
                if (gs.kills % 20 === 0) {
                    gs.wave++;
                    gs.spawnRate = Math.max(400, gs.spawnRate - 50);
                }
            }

            gs.bullets.forEach(b => b.update());
            gs.bullets = gs.bullets.filter(b => b.alive);
            gs.enemies.forEach(e => e.update());
            gs.enemies = gs.enemies.filter(e => e.alive);
            gs.pickups = gs.pickups.filter(p => !p.collected && p.life-- > 0);
            gs.particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.life--; });
            gs.particles = gs.particles.filter(p => p.life > 0);

            floatingTexts.forEach(ft => { ft.y += ft.vy; ft.life--; });
            floatingTexts.splice(0, floatingTexts.length, ...floatingTexts.filter(ft => ft.life > 0));

            checkCollisions();
        }

        draw();
        requestAnimationFrame(gameLoop);
    }

    function draw() {
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, CONFIG.WIDTH, CONFIG.HEIGHT);

        // 网格背景
        ctx.strokeStyle = 'rgba(155, 89, 182, 0.08)';
        ctx.lineWidth = 1;
        for (let i = 0; i < CONFIG.WIDTH; i += 40) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, CONFIG.HEIGHT); ctx.stroke();
        }
        for (let i = 0; i < CONFIG.HEIGHT; i += 40) {
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(CONFIG.WIDTH, i); ctx.stroke();
        }

        if (!gs.running) return;

        // 障碍物
        gs.obstacles.forEach(o => o.draw());

        // 拾取物
        gs.pickups.forEach(p => {
            drawPickupShape(p.x, p.y, p.type, gs.player ? gs.player.magnetActive : 0);
        });

        // 浮动文字
        floatingTexts.forEach(ft => {
            ctx.globalAlpha = ft.life / 60;
            ctx.fillStyle = ft.color;
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(ft.text, ft.x, ft.y);
            ctx.globalAlpha = 1;
        });

        gs.bullets.forEach(b => b.draw());
        gs.enemies.forEach(e => e.draw());
        gs.player.draw();

        // 粒子
        gs.particles.forEach(p => {
            ctx.globalAlpha = p.life / 30;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * (p.life / 30), 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        });

        // 经验升级提示
        if (gs.expReady) {
            ctx.fillStyle = '#f1c40f';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'center';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#f1c40f';
            ctx.fillText('* 触碰 STAR 升级 *', CONFIG.WIDTH/2, CONFIG.HEIGHT/2 - 60);
            ctx.shadowBlur = 0;
        }
    }

    // ==================== 输入处理 ====================
    document.addEventListener('keydown', e => {
        keys[e.key.toLowerCase()] = true;

        if (e.key >= '1' && e.key <= '9') {
            const idx = parseInt(e.key) - 1;
            if (gs.running && !gs.paused && idx < gs.player.skills.length) {
                gs.player.useSkill(idx);
            }
        }

        if (e.key === ' ' && gs.running && !gs.paused) {
            e.preventDefault();
            for (let i = gs.player.skills.length-1; i >= 0; i--) {
                if (gs.player.skills[i].level > 0 && gs.player.skills[i].cooldownTimer <= 0) {
                    gs.player.useSkill(i);
                    break;
                }
            }
        }
    });
    document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    // ==================== 游戏控制 ====================
    function selectSinger(singerId) {
        gs.selectedSinger = SINGERS[singerId];
        startGame();
    }

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('ui-overlay').style.display = 'flex';
        document.getElementById('exp-bar').style.display = 'block';
        document.getElementById('exp-text').style.display = 'block';
        document.getElementById('skill-ticket').style.display = 'block';
        document.getElementById('magnet-indicator').style.display = 'none';

        Object.assign(gs, {
            running: true, paused: false,
            gold: 0, tickets: 2, exp: 0, expToLevel: 10,
            expReady: false, wave: 1, kills: 0,
            baseDamage: 1,
            enemies: [], bullets: [], pickups: [], particles: [], buffs: [],
            obstacles: [],
            spawnTimer: 0, spawnRate: CONFIG.SPAWN_RATE, autoTimer: 0
        });

        generateObstacles();

        gs.player = new Player(gs.selectedSinger);

        gs.player.skills.forEach(s => {
            if (s.effects[0].type === 'china_shield') {
                gs.player.shields.push({angle: 0, hits: s.effects[0].hits, hitsLeft: s.effects[0].hits});
            }
        });

        updateUI();
        updateSkillBar();
    }

    function gameOver() {
        gs.running = false;
        document.getElementById('final-wave').textContent = gs.wave;
        document.getElementById('final-gold').textContent = gs.gold;
        document.getElementById('final-kills').textContent = gs.kills;
        document.getElementById('gameover-screen').style.display = 'flex';
        document.getElementById('ui-overlay').style.display = 'none';
        document.getElementById('exp-bar').style.display = 'none';
        document.getElementById('exp-text').style.display = 'none';
        document.getElementById('skill-ticket').style.display = 'none';
        document.getElementById('magnet-indicator').style.display = 'none';
    }

    function restartGame() {
        document.getElementById('gameover-screen').style.display = 'none';
        startGame();
    }

    function backToMenu() {
        document.getElementById('gameover-screen').style.display = 'none';
        document.getElementById('start-screen').style.display = 'flex';
    }

    // ==================== 绘制角色头像 ====================
    function drawSingerAvatar(canvasId, singer) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const w = canvas.width;
        const h = canvas.height;

        ctx.clearRect(0, 0, w, h);

        // 背景
        ctx.fillStyle = singer.avatarBg;
        ctx.beginPath();
        ctx.arc(w/2, h/2, w/2, 0, Math.PI * 2);
        ctx.fill();

        // 歌手标志 - 星形
        ctx.shadowBlur = 15;
        ctx.shadowColor = singer.color;
        ctx.fillStyle = singer.avatarAccent;
        ctx.beginPath();
        for (let i = 0; i < 10; i++) {
            const r = i % 2 === 0 ? w * 0.35 : w * 0.18;
            const angle = (i * Math.PI) / 5 - Math.PI / 2;
            const x = w/2 + r * Math.cos(angle);
            const y = h/2 + r * Math.sin(angle);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;

        // 签名
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(singer.name.substring(0, 2), w/2, h * 0.85);
    }

    // 初始化
    window.addEventListener('load', () => {
        // 歌手头像已使用真实图片，无需 Canvas 绘制
        requestAnimationFrame(gameLoop);
    });
    </script>
